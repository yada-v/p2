<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Two p5 Canvases</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>

<body>
  <div id="skyDiv"></div>
  <div id="rainDiv"></div>

  <script>
    // ---------- SKY SKETCH ----------
    new p5((p) => {
      let img;

      p.preload = () => {
        img = p.loadImage("sky.jpg");
      };

      p.setup = () => {
        let c = p.createCanvas(400, 300);
        c.parent("skyDiv");
        p.noLoop();
      };

      p.draw = () => {
        p.image(img, 0, 0, p.width, p.height);
      };
    });

    // ---------- RAIN SKETCH ----------
    new p5((p) => {
      let img;

      p.preload = () => {
        img = p.loadImage("rain.jpg");
      };

      p.setup = () => {
        let c = p.createCanvas(400, 300);
        c.parent("rainDiv");
        p.noLoop();
      };

      p.draw = () => {
        p.image(img, 0, 0, p.width, p.height);
      };
    });
  </script>
</body>
</html>
