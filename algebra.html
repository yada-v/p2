<p>Algebraic Resolution</p>
<p>

$$\frac{dv}{dy} = \frac{v}{h}$$

</p>

Fluid resistance depends on this gradient:

$$\tau = \eta \frac{dv}{dy}$$

For this case:

$$\tau = \eta \frac{v}{h}$$

Stress is force per area:

$$F = \tau A = \eta A \frac{v}{h}$$
</p>
